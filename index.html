<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Speed & XP Calculator</title>
<style>
    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #111, #222);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 10px;
    }

    .box {
        width: 100%;
        max-width: 500px;
        background: #1c1c1c;
        padding: 18px;
        border-radius: 20px;
        box-shadow: 0 0 25px black;
        text-align: center;
    }

    h1 { margin: 5px; font-size: 30px; }
    h2 { font-size: 18px; margin: 12px 0 5px; }

    select, input, button {
        width: 100%;
        font-size: 18px;
        padding: 12px;
        margin: 5px 0;
        border-radius: 12px;
        border: none;
    }

    select, input { background: #333; color: white; }
    button { background: #4CAF50; color: white; font-weight: bold; cursor: pointer; }
    button:active { transform: scale(0.97); }

    .info {
        background: #292929;
        border-radius: 12px;
        padding: 10px;
        margin: 10px 0;
        font-size: 15px;
    }

    .section {
        background: #242424;
        border-radius: 15px;
        padding: 10px;
        margin-top: 10px;
    }

    .caption { font-size: 12px; color: #999; margin: -2px 0 6px; text-align: left; }

    .divider {
        margin-top: 20px;
        padding-top: 10px;
        border-top: 1px solid #3a3a3a;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #888;
        text-align: left;
    }

    .toggle-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin: 12px 0 4px;
        font-size: 15px;
    }

    .switch { position: relative; display: inline-block; width: 46px; height: 26px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background-color: #444;
        transition: .2s;
        border-radius: 26px;
    }

    .slider:before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: .2s;
        border-radius: 50%;
    }

    .switch input:checked + .slider { background-color: #4CAF50; }
    .switch input:checked + .slider:before { transform: translateX(20px); }

    .result {
        margin-top: 2px;
        background: #333;
        padding: 15px;
        border-radius: 12px;
        font-size: 17px;
        font-weight: bold;
        line-height: 1.45;
        max-height: 300px;
        overflow-y: auto;
        overflow-wrap: anywhere;
        scrollbar-color: #4CAF50 #222;
    }

    .result-title { font-size: 22px; margin-bottom: 12px; }
    .progress-group { margin-top: 14px; text-align: left; }
    .progress-label { display: flex; justify-content: space-between; gap: 12px; font-size: 14px; }
    .progress-track { height: 10px; background: #1e1e1e; border-radius: 99px; overflow: hidden; margin: 5px 0 7px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #4CAF50, #8be28f); border-radius: inherit; }
    .progress-details { font-size: 13px; color: #d5d5d5; font-weight: normal; }
    .max-note { margin-top: 14px; color: #8be28f; font-size: 14px; }
</style>
</head>
<body>
<main class="box">
    <h1>⚡ Speed & XP Calculator</h1>

    <select id="world" onchange="updateInfo()">
        <option value="1">🌎 World 1</option>
        <option value="2">🌎 World 2</option>
        <option value="3">🌎 World 3</option>
    </select>

    <div class="info" id="info"></div>

    <div class="toggle-row">
        <label class="switch">
            <input type="checkbox" id="showFullNumbers" onchange="onToggleChange()">
            <span class="slider"></span>
        </label>
        <span>Show Full Numbers</span>
    </div>

    <div class="divider">Conversions</div>

    <section class="section">
        <h2>Speed ➜ XP & Level</h2>
        <input id="speedInput" type="number" placeholder="Enter Speed">
        <button type="button" onclick="speedToXPCalc()">Calculate</button>
    </section>

    <section class="section">
        <h2>Level ➜ XP & Speed</h2>
        <input id="levelInput" type="number" placeholder="Enter Level">
        <button type="button" onclick="levelToSpeedXPCalc()">Calculate</button>
    </section>

    <section class="section">
        <h2>XP ➜ Speed, Level, &amp; More</h2>
        <div class="caption">Commas optional</div>
        <input id="xpInput" type="text" inputmode="numeric" pattern="[0-9,]*" maxlength="700" placeholder="Enter XP">
        <button type="button" onclick="xpToSpeedCalc()">Calculate</button>
    </section>

    <section class="section">
        <div class="result" id="result" aria-live="polite">Result appears here</div>
    </section>
</main>

<script>
const worlds = {
    1: { startLevel: 1, startSpeed: 12, levelsPerSpeed: 1, speedGain: 2, maxSpeed: 300, maxLevel: 145 },
    2: { startLevel: 120, startSpeed: 50, levelsPerSpeed: 2, speedGain: 1, maxSpeed: 300, maxLevel: 620 },
    3: { startLevel: 400, startSpeed: 60, levelsPerSpeed: 5, speedGain: 1, maxSpeed: 300, maxLevel: 1600 }
};

function getWorld() {
    return worlds[document.getElementById('world').value];
}

function updateInfo() {
    const w = getWorld();
    document.getElementById('info').innerHTML = `
        Starting Level: <b>${w.startLevel}</b><br>
        Starting Speed: <b>${w.startSpeed}</b><br>
        Speed Gain: <b>+${w.speedGain} Speed every ${w.levelsPerSpeed} Level(s)</b><br>
        Maximum Speed: <b>${w.maxSpeed}</b><br>
        🏆 Max Speed Level: <b>${w.maxLevel}</b>`;
}

/* XP required for each level-up grows by 15%, rounded down. */
const MAX_SUPPORTED_LEVEL = 10000;

function buildXPTable() {
    const table = new Array(MAX_SUPPORTED_LEVEL + 1);
    table[1] = 0n;
    let increment = 100n;
    for (let level = 2; level <= MAX_SUPPORTED_LEVEL; level += 1) {
        table[level] = table[level - 1] + increment;
        increment = (increment * 23n) / 20n;
    }
    return table;
}

const cumulativeXP = buildXPTable();

function levelToXP(level) {
    return cumulativeXP[Math.min(Math.max(level, 1), MAX_SUPPORTED_LEVEL)];
}

function xpToLevel(xp) {
    if (xp <= 0n) return 1;
    if (xp >= cumulativeXP[MAX_SUPPORTED_LEVEL]) return MAX_SUPPORTED_LEVEL;

    let low = 1;
    let high = MAX_SUPPORTED_LEVEL;
    while (low < high) {
        const mid = Math.ceil((low + high) / 2);
        if (cumulativeXP[mid] <= xp) low = mid;
        else high = mid - 1;
    }
    return low;
}

const SCALE_NAMES = [
    '', 'Thousand', 'Million', 'Billion', 'Trillion', 'Quadrillion', 'Quintillion',
    'Sextillion', 'Septillion', 'Octillion', 'Nonillion', 'Decillion', 'Undecillion',
    'Duodecillion', 'Tredecillion', 'Quattuordecillion', 'Quindecillion', 'Sexdecillion',
    'Septendecillion', 'Octodecillion', 'Novemdecillion', 'Vigintillion', 'Unvigintillion',
    'Duovigintillion', 'Tresvigintillion', 'Quattuorvigintillion', 'Quinvigintillion',
    'Septemvigintillion', 'Octovigintillion', 'Novemvigintillion', 'Trigintillion',
    'Untrigintillion', 'Duotrigintillion', 'Trestrigintillion', 'Quattuortrigintillion',
    'Quintrigintillion', 'Sestrigintillion', 'Septentrigintillion', 'Octotrigintillion',
    'Novemtrigintillion', 'Quadragintillion'
];

function formatScientific(n) {
    const digits = n.toString();
    const mantissa = digits[0] + (digits.length > 1 ? `.${digits.slice(1, 3)}` : '');
    return `${mantissa} × 10^${digits.length - 1}`;
}

function formatXPShort(n) {
    if (n < 1000n) return n.toString();
    const digits = n.toString();
    const scaleIndex = Math.floor((digits.length - 1) / 3);
    if (scaleIndex >= SCALE_NAMES.length) return formatScientific(n);
    const splitAt = digits.length - scaleIndex * 3;
    const whole = digits.slice(0, splitAt);
    const fraction = digits.slice(splitAt, splitAt + 2).replace(/0+$/, '');
    return `${whole}${fraction ? `.${fraction}` : ''} ${SCALE_NAMES[scaleIndex]}`;
}

function formatXPFull(n) {
    return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

let showFullNumbers = false;
function formatXP(n) {
    return `${showFullNumbers ? formatXPFull(n) : formatXPShort(n)} XP`;
}

function formatPercent(value) {
    const bounded = Math.max(0, Math.min(100, value));
    return `${bounded.toFixed(2).replace(/\.00$/, '')}%`;
}

function parseXPInput(elementId) {
    const raw = document.getElementById(elementId).value.trim().replace(/,/g, '');
    return /^\d+$/.test(raw) ? BigInt(raw) : null;
}

function speedAtLevel(level, world) {
    const increases = Math.floor(Math.max(0, level - world.startLevel) / world.levelsPerSpeed);
    return Math.min(world.maxSpeed, world.startSpeed + increases * world.speedGain);
}

function nextSpeedLevel(level, world) {
    const speed = speedAtLevel(level, world);
    if (speed >= world.maxSpeed) return null;

    const currentBand = Math.floor(Math.max(0, level - world.startLevel) / world.levelsPerSpeed);
    const nextBandLevel = world.startLevel + (currentBand + 1) * world.levelsPerSpeed;
    return Math.min(nextBandLevel, MAX_SUPPORTED_LEVEL);
}

function progressData(xp, startXP, targetXP) {
    const span = targetXP - startXP;
    const gained = xp - startXP;
    const currentPercent = Number((gained * 10000n) / span) / 100;
    return {
        currentPercent,
        neededPercent: 100 - currentPercent,
        remaining: targetXP - xp,
        target: targetXP
    };
}

function progressMarkup(label, data, destination) {
    const current = formatPercent(data.currentPercent);
    const needed = formatPercent(data.neededPercent);
    return `
        <div class="progress-group">
            <div class="progress-label"><span>${label}</span><span>${current} / 100%</span></div>
            <div class="progress-track"><div class="progress-fill" style="width: ${Math.max(1, data.currentPercent)}%"></div></div>
            <div class="progress-details">
                ${needed} more needed to reach ${destination}<br>
                ${formatXP(data.remaining)} more XP to reach ${destination}<br>
                ${formatXP(data.target)} total XP to reach ${destination}
            </div>
        </div>`;
}

let lastCalculation = null;

function renderResult() {
    if (!lastCalculation) return;
    const result = document.getElementById('result');
    const c = lastCalculation;

    if (c.type === 'error') {
        result.textContent = c.message;
        return;
    }

    if (c.type === 'level') {
        result.innerHTML = `<div class="result-title">Level ${c.level}<br>⚡ Speed ${c.speed}<br>✨ ${formatXP(c.xp)}</div>`;
        return;
    }

    if (c.type === 'speed') {
        result.innerHTML = `<div class="result-title">Speed ${c.speed}<br>➜ Level ${c.level}<br>✨ ${formatXP(c.xp)}</div>`;
        return;
    }

    if (c.type === 'xp') {
        let html = `<div class="result-title">${formatXP(c.xp)}<br>➜ Level ${c.level}<br>⚡ Speed ${c.speed}</div>`;
        if (c.nextLevel) html += progressMarkup('Progress to next level', c.nextLevel, `Level ${c.level + 1}`);
        else html += '<div class="max-note">Maximum supported level reached.</div>';

        if (c.nextSpeed) html += progressMarkup('Progress to next speed', c.nextSpeed, `Speed ${c.speed + c.world.speedGain}`);
        else html += '<div class="max-note">Maximum speed reached for this world.</div>';
        result.innerHTML = html;
    }
}

function onToggleChange() {
    showFullNumbers = document.getElementById('showFullNumbers').checked;
    renderResult();
}

function levelToSpeedXPCalc() {
    const world = getWorld();
    const level = Math.floor(Number(document.getElementById('levelInput').value));
    if (!Number.isFinite(level) || level < world.startLevel) {
        lastCalculation = { type: 'error', message: 'Level is too low for this world.' };
    } else if (level > MAX_SUPPORTED_LEVEL) {
        lastCalculation = { type: 'error', message: `Level is too high (max ${MAX_SUPPORTED_LEVEL}).` };
    } else {
        lastCalculation = { type: 'level', level, speed: speedAtLevel(level, world), xp: levelToXP(level) };
    }
    renderResult();
}

function speedToXPCalc() {
    const world = getWorld();
    let speed = Number(document.getElementById('speedInput').value);
    if (!Number.isFinite(speed)) {
        lastCalculation = { type: 'error', message: 'Please enter a valid speed.' };
    } else {
        speed = Math.min(speed, world.maxSpeed);
        const levelsNeeded = speed <= world.startSpeed ? 0 : Math.ceil((speed - world.startSpeed) / world.speedGain) * world.levelsPerSpeed;
        const level = world.startLevel + levelsNeeded;
        lastCalculation = { type: 'speed', speed, level, xp: levelToXP(level) };
    }
    renderResult();
}

function xpToSpeedCalc() {
    const world = getWorld();
    const xp = parseXPInput('xpInput');
    if (xp === null) {
        lastCalculation = { type: 'error', message: 'Please enter a valid whole-number XP amount.' };
        renderResult();
        return;
    }

    const level = xpToLevel(xp);
    if (level < world.startLevel) {
        lastCalculation = { type: 'error', message: `That XP is below Level ${world.startLevel}.` };
        renderResult();
        return;
    }

    const speed = speedAtLevel(level, world);
    const nextLevelTarget = level < MAX_SUPPORTED_LEVEL ? levelToXP(level + 1) : null;
    const nextLevel = nextLevelTarget ? progressData(xp, levelToXP(level), nextLevelTarget) : null;
    const nextSpeedAtLevel = nextSpeedLevel(level, world);
    const currentSpeedBand = world.startLevel + Math.floor((level - world.startLevel) / world.levelsPerSpeed) * world.levelsPerSpeed;
    const nextSpeed = nextSpeedAtLevel && nextSpeedAtLevel > level
        ? progressData(xp, levelToXP(currentSpeedBand), levelToXP(nextSpeedAtLevel))
        : null;

    lastCalculation = { type: 'xp', xp, level, speed, nextLevel, nextSpeed, world };
    renderResult();
}

updateInfo();
</script>
</body>
</html>
